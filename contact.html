<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Av_eSAFE Gurukul</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .contact-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
        }
        .contact-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-main);
            font-family: var(--font-main);
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .contact-info {
            margin-top: 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            text-align: center;
        }
        .info-item h3 { color: var(--primary); margin-bottom: 0.5rem; }
        .info-item p { color: var(--text-muted); }
    </style>
</head>
<body>
    <header></header>
    <main>
        <section class="hero reveal">
            <h1>Get in Touch</h1>
            <p>Have questions or feedback? We'd love to hear from you.</p>
        </section>

        <div class="contact-container reveal">
            <div class="contact-card">
                <form id="contactForm">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" required placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" required placeholder="How can we help?"></textarea>
                    </div>
                    <button type="submit" class="btn-small" style="width: 100%; background: var(--primary); border: none; cursor: pointer;">Send Message</button>
                </form>
            </div>

            <div class="contact-info">
                <div class="info-item">
                    <h3>Email</h3>
                    <p>support@avesafe.com</p>
                </div>
                <div class="info-item">
                    <h3>Location</h3>
                    <p>Digital Campus, Internet</p>
                </div>
            </div>
        </div>
    </main>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Thank you for your message! We will get back to you soon.');
            e.target.reset();
        });
    </script>
</body>
</html>
