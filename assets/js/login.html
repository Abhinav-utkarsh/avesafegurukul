<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Av_eSAFE Gurukul</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 2rem;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .login-card h1 { margin-bottom: 2rem; color: var(--primary); }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-main);
            font-family: var(--font-main);
        }
        .form-group input:focus { outline: none; border-color: var(--primary); }
    </style>
</head>
<body>
    <header></header>
    <div class="login-container">
        <div class="login-card">
            <h1>Welcome Back</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <button type="submit" class="btn-small" style="width: 100%; background: var(--primary); border: none; cursor: pointer;">Start Learning</button>
            </form>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            // Store session
            const user = { name, email };
            localStorage.setItem('user_session', JSON.stringify(user));
            
            // Redirect to previous page or home
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
